        - text: Sobotni wieczór integracyjny z pilotem i uczestnikami. Rozmowy o lataniu, wymiana doświadczeń, budowanie kontaktów w środowisku lotniczym.
    - heading "Dla kogo jest Camp Akrobacyjny" [level=2] [ref=e47]
    - paragraph [ref=e48]: "Camp jest zaprojektowany tak, żeby dać maksimum wartości trzem grupom uczestników:"
    - list [ref=e49]:
      - listitem [ref=e50]:
        - strong [ref=e51]: Piloci z PPL(A) chcący zacząć przygodę z akrobacją
        - text: ", masz licencję, latasz, ale nigdy nie próbowałeś akrobacji? Camp to idealne wprowadzenie. 6 lotów da Ci solidne podstawy i odpowiedź na pytanie, czy akrobacja to Twoja droga."
      - listitem [ref=e52]:
        - strong [ref=e53]:
          - text: Piloci przygotowujący się do kursu
          - link "FCL.800" [ref=e54] [cursor=pointer]:
            - /url: /blog/kurs-akrobacji-fcl800
        - text: ", Camp to doskonałe przygotowanie przed właściwym szkoleniem. Poznasz samolot, figury i instruktora. Wejdziesz w kurs z przewagą doświadczenia."
      - listitem [ref=e55]:
        - strong [ref=e56]: Doświadczeni piloci chcący potrenować figury
        - text: ", masz już FCL.800 lub doświadczenie akrobacyjne? Camp to okazja, żeby wrócić do formy, potrenować konkretne figury i podzielić się wiedzą z innymi uczestnikami."
    - paragraph [ref=e57]: Nie masz licencji pilota? Nie ma problemu, latasz jako pasażer na tylnym fotelu z Maciejem za sterami. Pełne doświadczenie akrobacyjne, bezpiecznie i pod opieką profesjonalisty.
    - heading "Kto prowadzi Camp" [level=2] [ref=e58]
    - generic [ref=e59]:
      - generic [ref=e60]:
        - strong [ref=e61]: Maciej Kulaszewski
        - text: Pilot domowy akrobacja.com. Instruktor FI(A), ponad 3 000+ godzin nalotu na Extra 300L. Wielokrotny Mistrz Polski 2022, wielokrotny Mistrz Polski, Anglii i Niemiec w akrobacji lotniczej. Maciej prowadzi każdy camp osobiście, to nie jest gość na weekend, to Twój instruktor na co dzień.
      - generic [ref=e62]:
        - strong [ref=e63]: Artur Kielak
        - text: Mistrz Polski w akrobacji lotniczej, pilot liniowy Ryanair. Łączy doświadczenie zawodnicze z codzienną praktyką pilota komercyjnego. Na campie dzieli się perspektywą pilota, który akrobację traktuje jako trening bezpieczeństwa, i jednocześnie pasję życia.
