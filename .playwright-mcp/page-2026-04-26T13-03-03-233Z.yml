    - paragraph [ref=e30]:
      - text: Camp Akrobacyjny to intensywne, 2-dniowe doświadczenie stworzone dla tych, którzy chcą zanurzyć się w świat akrobacji lotniczej. To nie pojedynczy lot zapoznawczy, to
      - strong [ref=e31]: pełny weekend z akrobacją
      - text: ": teoria, briefing, latanie, debriefing, wieczorne rozmowy o lataniu i powtórka następnego dnia. Wszystko na samolocie"
      - link "Extra 300L SP-EKS" [ref=e32] [cursor=pointer]:
        - /url: /blog/extra-300l-samolot-akrobacyjny
      - text: ", jednej z najlepszych maszyn akrobacyjnych na świecie."
    - heading "Co obejmuje Camp" [level=2] [ref=e33]
    - generic [ref=e34]:
      - generic [ref=e35]:
        - strong [ref=e36]: 6 lotów akrobacyjnych
        - text: Na Extra 300L SP-EKS z Maciejem Kulaszewskim. Pętle, beczki, hammerheady, lot odwrócony, pełen program, stopniowo budujący Twoje doświadczenie.
      - generic [ref=e37]:
        - strong [ref=e38]: Teoria akrobacji
        - text: Figury Aresti, fizjologia G-force, aerodynamika akrobacji. Briefing przed każdym lotem, debriefing po, dokładnie jak na szkoleniu zawodowym.
      - generic [ref=e39]:
        - strong [ref=e40]: Certyfikat ukończenia
        - text: Oficjalny certyfikat Camp Akrobacyjnego akrobacja.com. Potwierdzenie Twojego doświadczenia i punkt wyjścia do dalszego rozwoju.
      - generic [ref=e41]:
