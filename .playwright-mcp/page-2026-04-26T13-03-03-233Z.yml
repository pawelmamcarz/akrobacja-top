    - generic [ref=e122]:
      - heading "Czy muszę mieć licencję pilota?" [level=3] [ref=e123]
      - paragraph [ref=e124]:
        - text: Nie, Camp jest otwarty zarówno dla pilotów z licencją PPL(A), jak i dla osób bez uprawnień lotniczych. Jeśli nie masz licencji, latasz z pilotem Maciejem Kulaszewskim jako pasażer na tylnym fotelu Extra 300L. Doświadczasz pełnego programu akrobacyjnego, pętle, beczki, lot odwrócony, przeciążenia. Jeśli masz PPL(A) i min. 30h PIC, lot może być zaliczony jako element przygotowania do
        - link "kursu FCL.800" [ref=e125] [cursor=pointer]:
          - /url: /blog/kurs-akrobacji-fcl800
        - text: .
    - generic [ref=e126]:
      - heading "Gdzie jest nocleg?" [level=3] [ref=e127]
      - paragraph [ref=e128]: Nocleg zapewniamy "u Grubego" w Radomiu, sprawdzone miejsce blisko lotniska, w lotniczym klimacie. Nocleg z soboty na niedzielę jest wliczony w cenę campu. Jeśli wolisz nocować we własnym zakresie (hotel, Airbnb), nie ma problemu, po prostu daj nam znać przy zapisie.
    - generic [ref=e129]:
      - heading "Co zabrać na Camp?" [level=3] [ref=e130]
      - paragraph [ref=e131]:
        - text: Wygodne ubranie sportowe, okulary przeciwsłoneczne, buty sportowe (nie klapki), dowód tożsamości. Jeśli masz licencję pilota, weź ją ze sobą.
        - strong [ref=e132]: Spadochrony, kaski i słuchawki zapewniamy.
        - text: Nie jedz ciężkiego posiłku tuż przed lotem. Zabierz też dobry humor i otwartą głowę, resztą zajmiemy się my.
    - generic [ref=e133]:
      - heading "Co jeśli będzie zła pogoda?" [level=3] [ref=e134]
      - paragraph [ref=e135]: Akrobacja wymaga dobrej widoczności i odpowiedniego pułapu chmur (minimum 1500 ft AGL). Jeśli pogoda uniemożliwi latanie, przenosimy loty na najbliższy możliwy termin. Teoria i część naziemna odbywają się niezależnie od pogody. W najgorszym scenariuszu ustalamy termin zastępczy, Twoje pieniądze nie przepadają. Maj to statystycznie jeden z najlepszych miesięcy do latania w Polsce.
