<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 600" width="100%" style="max-height:380px" class="diecut">
  <rect width="240" height="600" rx="14" fill="#FFFFFF"></rect>
  <rect x="10" y="10" width="220" height="580" rx="10" fill="#F4F1EA"></rect>
  <!-- Single huge column of letters, vertical -->
  <g font-family="Anton" font-size="64" letter-spacing="2" text-anchor="middle">
    <text x="120" y="80" fill="#0A2F7C">M</text>
    <text x="120" y="140" fill="#0A2F7C">A</text>
    <text x="120" y="200" fill="#0A2F7C">K</text>
    <text x="120" y="260" fill="#0A2F7C">E</text>
    <text x="120" y="320" fill="#E11E26">·</text>
    <text x="120" y="380" fill="#E11E26">I</text>
    <text x="120" y="440" fill="#E11E26">T</text>
  </g>
  <!-- arrow up -->
  <g transform="translate(120,490)">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#0A2F7C" stroke-width="6"></line>
    <polygon points="-14,-4 14,-4 0,-30" fill="#0A2F7C"></polygon>
  </g>
  <text x="120" y="580" text-anchor="middle" font-family="JetBrains Mono" font-size="11" letter-spacing="4" fill="#0A2F7C">VERTICAL ↑</text>
</svg>