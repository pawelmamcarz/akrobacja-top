name: Cron — voucher delivery, welcome sequence, abandoned-cart recovery

on:
  schedule:
    # Hourly at :07 — offset so we don't collide with provider top-of-hour jobs.
    - cron: '7 * * * *'
    # Daily at 04:17 UTC (06:17 Europe/Warsaw) — wFirma expenses pull.
    - cron: '17 4 * * *'
    # Every 15 min — Google Calendar -> D1 sync (lot/serwis blokuje sloty klienta).
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    # Hourly bundle — skip on the daily wFirma slot and the 15-min calendar slot.
    if: github.event_name == 'workflow_dispatch' || (github.event.schedule != '17 4 * * *' && github.event.schedule != '*/15 * * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Welcome emails (day 0/2/5)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/welcome-emails
        continue-on-error: true

      - name: Abandoned-cart recovery (-5% WRACAM5)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/abandoned-checkouts
        continue-on-error: true

      - name: Scheduled gift voucher delivery (send_at)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/scheduled-vouchers
        continue-on-error: true

      # Post-flight Google Reviews ask. Idempotent (claim-before-send),
      # max 50 SMS per run. Hourly schedule is safe because the SQL filter
      # only returns bookings that flew at least 1 day ago and haven't been
      # pinged. In practice this fires once per booking.
      - name: Post-flight review SMS
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/post-flight-review-sms
        continue-on-error: true

      # Refresh Google Reviews (Places API -> D1 reviews table).
      # Endpoint ma wewnetrzny throttle 6h, wiec choc leci co godzine, faktyczny
      # call do Places API dzieje sie 4x/dobe (~120/mc, miesci sie w darmowym
      # $200/mc kredycie Google Cloud). Miedzy callami endpoint odpowiada
      # {skipped: 'throttle'} bez kontaktu z Google API.
      - name: Refresh Google Reviews
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/refresh-google-reviews
        continue-on-error: true

      # Lead magnet 5-day email course - nurture steps 2/4/7/14
      # (krok 0 wysyla endpoint /api/lead-magnet od razu po zapisie).
      # Endpoint sprawdza created_at vs delayDays, wiec hourly trigger
      # jest bezpieczny - faktyczne maile leca tylko gdy nadejdzie czas.
      - name: Lead magnet nurture emails
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/lead-magnet-emails
        continue-on-error: true

  # Google Calendar -> D1 sync every 15 min. Zaciąga publiczny kalendarz "Loty
  # akrobacja.com" (GOOGLE_CALENDAR_ICS_URL) do calendar_events; loty i serwis
  # mechanika blokują wolne terminy klientów. Idempotentne, reconcile usuniętych.
  google-calendar:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Sync Google Calendar (ICS -> calendar_events)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/sync-google-calendar
        continue-on-error: true

  # Daily pull of last-90-days expenses from wFirma into D1 (feeds admin
  # Koszty + Rozliczenia views). Idempotent upsert by wfirma_id, runs once
  # per night so admin sees fresh numbers in the morning.
  wfirma-expenses:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 4 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Sync wFirma expenses (90-day rolling window)
        run: |
          response=$(curl -sS -w "\n__HTTP_CODE__%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://akrobacja.com/api/cron/sync-wfirma-expenses)
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1 | sed 's/__HTTP_CODE__//')
          echo "HTTP $code"
          echo "$body"
          [ "$code" = "200" ] || exit 1
