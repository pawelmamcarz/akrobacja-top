<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset hasła | akrobacja.com Admin</title>
<meta name="robots" content="noindex, nofollow">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f2f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: #1a1a2e; }
.card { background: #fff; max-width: 460px; width: 100%; padding: 36px; border-radius: 6px; box-shadow: 0 2px 16px rgba(0,0,0,.06); }
h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.lead { color: #6B7A90; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: #6B7A90; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
.field input { width: 100%; padding: 12px 14px; border: 1px solid #c4d2e0; font-size: 14px; outline: none; }
.field input:focus { border-color: #1B4DB5; }
button { width: 100%; padding: 14px; background: #1B4DB5; color: #fff; border: 0; font-weight: 700; font-size: 14px; letter-spacing: .04em; cursor: pointer; }
button:disabled { background: #99a5b8; cursor: not-allowed; }
.msg { padding: 12px; margin-top: 12px; font-size: 13px; line-height: 1.5; }
.msg.ok { background: #f0fbf4; color: #1a6e2e; border-left: 3px solid #27ae60; }
.msg.err { background: #fff5f5; color: #b3001b; border-left: 3px solid #C41E3A; }
.back { text-align: center; margin-top: 18px; font-size: 13px; }
.back a { color: #1B4DB5; text-decoration: none; }
.back a:hover { text-decoration: underline; }
.hint { font-size: 12px; color: #6B7A90; margin-top: 6px; }
</style>
</head>
<body>
<div class="card">
  <h1>Ustaw nowe hasło</h1>
  <p class="lead">Wpisz nowe hasło do panelu admina akrobacja.com. Min. 12 znaków. Po zmianie zostaniesz wylogowany ze wszystkich urządzeń.</p>
  <div class="field">
    <label>Nowe hasło</label>
    <input type="password" id="pw1" autofocus minlength="12" autocomplete="new-password">
    <div class="hint">Sugerowane: 16+ znaków, mieszane litery i cyfry. Zapisz w password manager.</div>
  </div>
  <div class="field">
    <label>Powtórz hasło</label>
    <input type="password" id="pw2" minlength="12" autocomplete="new-password" onkeydown="if(event.key==='Enter')submit()">
  </div>
  <button id="btn" onclick="submit()">Ustaw nowe hasło</button>
  <div id="msg"></div>
  <div class="back"><a href="/admin">← Wróć do logowania</a></div>
</div>
<script>
const params = new URL(location.href).searchParams;
const token = params.get('token');
const msg = document.getElementById('msg');
function showMsg(kind, text) { msg.className = 'msg ' + kind; msg.textContent = text; }
async function submit() {
  if (!token) { showMsg('err', 'Brak tokenu w linku. Otwórz reset link z maila ponownie.'); return; }
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1.length < 12) { showMsg('err', 'Hasło musi mieć min. 12 znaków.'); return; }
  if (pw1 !== pw2) { showMsg('err', 'Hasła nie pasują.'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Ustawiam...';
  try {
    const res = await fetch('/api/admin/auth/password-reset/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pw1 }),
    });
    const data = await res.json();
    if (!res.ok) {
      showMsg('err', data.error || 'Błąd');
      btn.disabled = false; btn.textContent = 'Ustaw nowe hasło';
      return;
    }
    showMsg('ok', `Hasło ustawione. Loguj się przy /admin nowym hasłem (${data.email}).`);
    btn.textContent = 'Gotowe';
    setTimeout(() => { location.href = '/admin'; }, 2500);
  } catch (err) {
    showMsg('err', 'Błąd połączenia: ' + (err.message || 'unknown'));
    btn.disabled = false; btn.textContent = 'Ustaw nowe hasło';
  }
}
if (!token) showMsg('err', 'Brak tokenu w URL. Otwórz reset link z maila ponownie.');
</script>
</body>
</html>
