<script>
const imgs = document.querySelectorAll('.gallery img');
let current = 0;
function openLb(i) {
  current = i;
  document.getElementById('lbImg').src = imgs[i].src;
  document.getElementById('lbImg').alt = imgs[i].alt;
  document.getElementById('lbCaption').textContent = imgs[i].alt;
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  lb.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  lb.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
function navLb(dir) {
  current = (current + dir + imgs.length) % imgs.length;
  document.getElementById('lbImg').src = imgs[current].src;
  document.getElementById('lbCaption').textContent = imgs[current].alt;
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
});
</script>
