<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twój lot Extra 300L | akrobacja.com</title>
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Zdjęcia i filmy z Twojego lotu akrobacyjnego Extra 300L SP-EKS.">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"></noscript>
<style>
:root{--navy:#0A2F7C;--red:#C41E3A;--black:#0A1428;--white:#FFFFFF;--chrome:#7A8FA6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0A1428;color:#fff;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:96px 24px 64px}
.head{text-align:center;margin-bottom:40px}
.head .eyebrow{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.22em;color:var(--chrome);text-transform:uppercase;margin-bottom:12px}
.head h1{font-family:'Montserrat',sans-serif;font-size:clamp(28px,4.5vw,48px);font-weight:900;text-transform:uppercase;line-height:1.05;margin-bottom:8px}
.head h1 .accent{color:var(--red)}
.head .sub{color:var(--chrome);font-size:14px}
.head .meta{display:flex;justify-content:center;gap:24px;margin-top:18px;color:rgba(255,255,255,.55);font-size:12px;flex-wrap:wrap}
.head .meta strong{color:#fff;font-weight:600}
.section-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:.2em;color:var(--chrome);text-transform:uppercase;margin:48px 0 18px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.videos{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:16px}
@media(max-width:640px){.videos{grid-template-columns:1fr}}
.video-card{background:#000;position:relative}
.video-card video{width:100%;height:auto;display:block}
.video-card .vc-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#0d1a2e;font-size:11px;color:rgba(255,255,255,.6)}
.video-card .vc-bar strong{color:#fff;font-weight:500}
.video-card .vc-bar a{color:var(--navy);text-decoration:none;font-weight:600}
.video-card .vc-bar a:hover{color:#fff}
.photos{columns:3;column-gap:12px}
@media(max-width:1024px){.photos{columns:2}}
@media(max-width:600px){.photos{columns:1}}
.photo{break-inside:avoid;margin-bottom:12px;position:relative;cursor:pointer;overflow:hidden;background:#0d1a2e}
.photo img{width:100%;display:block;transition:opacity .2s}
.photo:hover img{opacity:.85}
.photo .dl-btn{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;padding:6px 10px;font-size:10px;font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;text-decoration:none;opacity:0;transition:opacity .15s}
.photo:hover .dl-btn{opacity:1}
.footer-cta{margin-top:64px;padding:36px;text-align:center;background:rgba(27,77,181,.08);border:1px solid rgba(255,255,255,.06)}
.footer-cta p{color:var(--chrome);font-size:14px;margin-bottom:18px;line-height:1.6}
.footer-cta strong{color:#fff;font-weight:600}
.footer-cta a{display:inline-block;background:var(--red);color:#fff;padding:14px 32px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;text-decoration:none;margin:0 6px}
.footer-cta a.alt{background:transparent;border:1px solid rgba(255,255,255,.2)}
.empty,.err{text-align:center;padding:80px 24px;color:var(--chrome);font-size:15px;line-height:1.7}
.err strong{color:var(--red);display:block;font-family:'Montserrat',sans-serif;font-size:22px;letter-spacing:.04em;margin-bottom:12px;text-transform:uppercase}
/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:2000;display:none;align-items:center;justify-content:center;padding:32px}
.lb.open{display:flex}
.lb img{max-width:95%;max-height:90vh;object-fit:contain}
.lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:36px;cursor:pointer}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:48px;cursor:pointer;padding:20px}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-dl{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#C41E3A;color:#fff;padding:10px 22px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;text-decoration:none}
.expires-note{margin-top:32px;font-size:12px;color:rgba(255,255,255,.4);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <div class="eyebrow">akrobacja.com &middot; Extra 300L SP-EKS</div>
    <h1>Twój lot <span class="accent">akrobacyjny</span></h1>
    <p class="sub" id="subtitle">Ładowanie materiału...</p>
    <div class="meta" id="meta" style="display:none"></div>
  </header>
  <main id="content"></main>
</div>

<div class="lb" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true" onclick="if(event.target===this)closeLb()">
  <button class="lb-close" type="button" aria-label="Zamknij" onclick="closeLb()">&times;</button>
  <button class="lb-nav lb-prev" type="button" aria-label="Poprzednie" onclick="navLb(-1)">&#8249;</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" type="button" aria-label="Następne" onclick="navLb(1)">&#8250;</button>
  <a class="lb-dl" id="lbDl" href="" download>Pobierz →</a>
</div>

<script>
const token = new URL(location.href).searchParams.get('t');
const content = document.getElementById('content');
const subtitle = document.getElementById('subtitle');
const meta = document.getElementById('meta');
let photoList = [];
let lbIdx = 0;

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (Number.isNaN(d.getTime())) return s;
  return d.toLocaleDateString('pl-PL', { year:'numeric', month:'long', day:'numeric' });
}
function fmtExpires(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('pl-PL', { year:'numeric', month:'long', day:'numeric' });
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function fileUrl(id, dl) {
  return `/api/share/${token}/file/${id}${dl ? '?dl=1' : ''}`;
}

async function init() {
  if (!token || !/^[a-f0-9]{32,}$/.test(token)) {
    return showError('Nieprawidłowy link', 'Sprawdź czy skopiowałeś cały adres.');
  }
  try {
    const res = await fetch(`/api/share/${encodeURIComponent(token)}`);
    if (res.status === 410) {
      const data = await res.json();
      return showError('Link wygasł', `Materiał był dostępny do ${fmtExpires(data.expires_at)}. Skontaktuj się z nami, możemy go odświeżyć.`);
    }
    if (!res.ok) {
      return showError('Nie znaleziono', 'Ten link nie istnieje lub został unieważniony.');
    }
    const data = await res.json();
    render(data);
  } catch (err) {
    showError('Błąd połączenia', err.message || 'Spróbuj odświeżyć stronę.');
  }
}

function render(data) {
  subtitle.textContent = data.customer_name
    ? `Cześć ${data.customer_name.split(/\s+/)[0]}! Tu Twój materiał z lotu ${data.package_name || ''}.`.trim()
    : `Materiał z lotu ${data.package_name || 'akrobacyjnego'}.`;

  const bits = [];
  if (data.package_name) bits.push(`<span><strong>Pakiet:</strong> ${esc(data.package_name)}</span>`);
  if (data.flight_date) bits.push(`<span><strong>Lot:</strong> ${esc(fmtDate(data.flight_date))}</span>`);
  bits.push(`<span><strong>Link ważny do:</strong> ${esc(fmtExpires(data.expires_at))}</span>`);
  meta.innerHTML = bits.join('');
  meta.style.display = 'flex';

  const videos = (data.media || []).filter(m => m.kind === 'video');
  const photos = (data.media || []).filter(m => m.kind === 'photo');
  photoList = photos;

  if (videos.length === 0 && photos.length === 0) {
    content.innerHTML = '<div class="empty">Materiał jest jeszcze w obróbce. Wróć tu za chwilę.</div>';
    return;
  }

  let html = '';
  if (videos.length) {
    html += '<h2 class="section-title">Filmy</h2><div class="videos">';
    videos.forEach(v => {
      html += `<div class="video-card">
        <video controls preload="metadata" playsinline${v.width && v.height ? ` width="${v.width}" height="${v.height}"` : ''}>
          <source src="${fileUrl(v.id)}" type="${esc(v.content_type)}">
        </video>
        <div class="vc-bar">
          <strong>${esc(v.filename)}</strong>
          <a href="${fileUrl(v.id, true)}">Pobierz ↓</a>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  if (photos.length) {
    html += `<h2 class="section-title">Zdjęcia &middot; ${photos.length}</h2><div class="photos" id="photos">`;
    photos.forEach((p, i) => {
      html += `<div class="photo" data-i="${i}">
        <img src="${fileUrl(p.id)}" alt="" loading="lazy"${p.width && p.height ? ` width="${p.width}" height="${p.height}"` : ''}>
        <a class="dl-btn" href="${fileUrl(p.id, true)}" onclick="event.stopPropagation()">Pobierz ↓</a>
      </div>`;
    });
    html += '</div>';
  }
  html += `<div class="footer-cta">
    <p><strong>Dzięki za lot!</strong><br>Wyślij link znajomym, podziel się materiałem - jest Twój.<br>Voucher na kolejny lot lub w prezencie dla kogoś bliskiego?</p>
    <a href="/voucher-prezent" target="_blank">Kup voucher</a>
    <a href="/galeria" class="alt" target="_blank">Galeria SP-EKS</a>
  </div>
  <p class="expires-note">Link działa do ${esc(fmtExpires(data.expires_at))}. Po tej dacie pliki znikają z serwera - jeśli chcesz dłuższy dostęp, pobierz je teraz.</p>`;
  content.innerHTML = html;

  document.querySelectorAll('.photo').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;
      openLb(parseInt(el.dataset.i, 10));
    });
  });
}

function openLb(i) {
  lbIdx = i;
  updateLb();
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  lb.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  lb.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
function navLb(d) {
  lbIdx = (lbIdx + d + photoList.length) % photoList.length;
  updateLb();
}
function updateLb() {
  const p = photoList[lbIdx];
  if (!p) return;
  document.getElementById('lbImg').src = fileUrl(p.id);
  document.getElementById('lbDl').href = fileUrl(p.id, true);
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
});

function showError(title, body) {
  subtitle.style.display = 'none';
  content.innerHTML = `<div class="err"><strong>${esc(title)}</strong>${esc(body)}</div>`;
}

init();
</script>
</body>
</html>
