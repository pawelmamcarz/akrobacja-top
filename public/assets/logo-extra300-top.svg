<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-label="Extra 300L">
  <!-- Propeller -->
  <line x1="60" y1="6" x2="60" y2="22"/>
  <line x1="52" y1="10" x2="68" y2="14"/>
  <line x1="68" y1="10" x2="52" y2="14"/>
  <!-- Spinner cone -->
  <path d="M56 22 L60 16 L64 22 Z"/>
  <!-- Fuselage -->
  <path d="M55 22 Q60 18 65 22 L66 56 L66 78 L64 92 L60 96 L56 92 L54 78 L54 56 Z"/>
  <!-- Canopy (bubble) — indicates cockpit from top -->
  <ellipse cx="60" cy="44" rx="4" ry="10"/>
  <!-- Left wing -->
  <path d="M9 48 L54 40 L54 58 L9 54 Z"/>
  <!-- Right wing -->
  <path d="M111 48 L66 40 L66 58 L111 54 Z"/>
  <!-- Wing tips — aerobatic detail -->
  <line x1="9" y1="48" x2="9" y2="54"/>
  <line x1="111" y1="48" x2="111" y2="54"/>
  <!-- Horizontal stabilizer left -->
  <path d="M33 84 L56 78 L56 88 L33 94 Z"/>
  <!-- Horizontal stabilizer right -->
  <path d="M87 84 L64 78 L64 88 L87 94 Z"/>
  <!-- Vertical fin ridge from top -->
  <line x1="60" y1="70" x2="60" y2="94"/>
</svg>
